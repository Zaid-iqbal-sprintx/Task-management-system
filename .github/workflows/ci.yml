name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build (next build + type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Build doesn't call the API, but the var has a sane fallback anyway.
          NEXT_PUBLIC_BACKEND_URL: http://localhost:5002
